name: concordfs-ci

on:
  push:
    branches: [main, "agent/**", "codex/**"]
    paths:
      - "sdk/python/**"
      - "docs/WITNESS_LEDGER.md"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "sdk/python/**"
      - "docs/WITNESS_LEDGER.md"
      - ".github/workflows/ci.yml"
  workflow_dispatch: {}

jobs:
  python-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install SDK and test dependencies
        run: python -m pip install -e "sdk/python[dev]"
      - name: Run test suite
        working-directory: sdk/python
        run: python -m pytest -q
      - name: Qualify three-user witness deployment
        working-directory: sdk/python
        run: |
          chmod +x tests/integration_witness_multiuser.sh
          # Editable installs point at the checkout. Permit the three isolated
          # test users to traverse that path without making files writable.
          sudo chmod o+x "$HOME" "$HOME/work" \
            "$(dirname "$GITHUB_WORKSPACE")" "$GITHUB_WORKSPACE"
          sudo find "$GITHUB_WORKSPACE/sdk" -type d -exec chmod o+rx {} +
          sudo --preserve-env=PATH,PYTHONPATH bash tests/integration_witness_multiuser.sh
