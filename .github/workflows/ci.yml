name: concordfs-ci

on:
  push:
    branches: [main, "agent/**", "codex/**"]
    paths:
      - "sdk/python/**"
      - "docs/WITNESS_LEDGER.md"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "sdk/python/**"
      - "docs/WITNESS_LEDGER.md"
      - ".github/workflows/ci.yml"
  workflow_dispatch: {}

jobs:
  python-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install SDK and test dependencies
        # A regular wheel install is required because the integration clients
        # run as separate Unix users that cannot traverse the runner checkout.
        run: python -m pip install "sdk/python[dev]"
      - name: Run test suite
        working-directory: sdk/python
        run: python -m pytest -q
      - name: Qualify three-user witness deployment
        working-directory: sdk/python
        run: |
          chmod +x tests/integration_witness_multiuser.sh
          sudo --preserve-env=PATH,PYTHONPATH bash tests/integration_witness_multiuser.sh
